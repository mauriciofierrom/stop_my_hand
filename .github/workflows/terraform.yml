name: Terraform

on:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

jobs:
  terraform:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    env:
      TF_VAR_grafana_auth: ${{ secrets.GRAFANA_AUTH }}
      TF_VAR_metrics_bearer_token: ${{ secrets.METRICS_BEARER_TOKEN }}
      TF_VAR_base_url: ${{ vars.BASE_URL }}

      TF_ACCESS_KEY: ${{ secrets.TF_ACCESS_KEY }}
      TF_SECRET_KEY: ${{ secrets.TF_SECRET_KEY }}

      BASE_URL: ${{ vars.BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Wait for /metrics
        retry:
          max-attempts: 10
          when: failure()
        run: curl -f "$BASE_URL/metrics"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="access_key=$TF_ACCESS_KEY" \
            -backend-config="secret_key=$TF_SECRET_KEY"

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve
